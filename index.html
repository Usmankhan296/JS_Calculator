<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="style.css">

<body>
    <div class="container">
        <div class="calculator">
            <form>
                <div>
                    <input id="show" class="number" type="text" name="display">
                </div>
                <div class="buttons">
                    <div>

                        <input id="d" type="button" value="AC">
                        <input id="r" type="button" value="DE">
                        <input id="." type="button" value="." >
                        <input id="/" type="button" value="/">
                    </div>
                    <div>
                        
                        <input id="9" type="button" value="9">
                        <input id="8" type="button" value="8">
                          <input id="7" type="button" value="7">
                              <input id="*" type="button" value="*" >
                    </div>
                    <div>    
                           <input id="6" type="button" value="6">
                        <input id="5" type="button" value="5" >
                     <input id="4" type="button" value="4" >
                 
                        <input id="+" type="button" value="+" >
                    
                    </div>
                   
                    <div>
                           <input id="3" type="button" value="3" >
                        <input id="2" type="button" value="2" >
                        <input id="1" type="button" value="1">
                        <input id="-" type="button" value="-">
                    </div>
                    <div>
                        <input class="num" id="00" type="button" value="00" >
                        <input class="num" id="0" type="button" value="0" >
                        <input class="num equal" id="="   type="button" value="=">
                  </div>
                </div>
            </form>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
